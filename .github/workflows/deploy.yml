name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      ref:
        description: Git ref/SHA to deploy (defaults to current master)
        required: false
        type: string

jobs:
  deploy-staging:
    if: github.event_name == workflow_run && github.event.workflow_run.conclusion == success
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging release via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BOT2BOT_SSH_HOST }}
          username: ${{ secrets.BOT2BOT_SSH_USER }}
          key: ${{ secrets.BOT2BOT_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/alex/bot2bot
            git fetch origin master
            git reset --hard ${{ github.event.workflow_run.head_sha }}
            npm ci --no-audit --no-fund
            (cd mcp && npm ci --no-audit --no-fund)
            sudo ./scripts/deploy_release.sh staging ${{ github.event.workflow_run.head_sha }}

  deploy-manual:
    if: github.event_name == workflow_dispatch
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve ref
        id: ref
        run: echo "ref=${{ inputs.ref || origin/master }}" >> "$GITHUB_OUTPUT"
      - name: Deploy selected release via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BOT2BOT_SSH_HOST }}
          username: ${{ secrets.BOT2BOT_SSH_USER }}
          key: ${{ secrets.BOT2BOT_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/alex/bot2bot
            git fetch origin master
            git reset --hard "${{ steps.ref.outputs.ref }}"
            npm ci --no-audit --no-fund
            (cd mcp && npm ci --no-audit --no-fund)
            sudo ./scripts/deploy_release.sh "${{ inputs.environment }}" HEAD
