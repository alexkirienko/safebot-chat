<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SafeBot.Chat — Roadmap board</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#F6F7FB" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .board-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin: 16px 0 8px; }
  .board-head h1 { margin: 0; }
  .board-meta { color: var(--text-3); font-size: 13.5px; }
  .board-meta a { color: var(--text-2); }
  .columns { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; margin-top: 24px; align-items: start; }
  @media (max-width: 880px) { .columns { grid-template-columns: 1fr; } }
  .col { background: var(--surface-2); border-radius: 14px; padding: 16px 14px 18px; border: 1px solid var(--border); min-height: 280px; }
  .col__head { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 10px; }
  .col__title { font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
  .col__count { color: var(--text-3); font-size: 12px; font-weight: 500; padding: 2px 9px; background: var(--surface-3); border-radius: 999px; }
  .col--doing .col__title { color: #2E7D32; }
  .col--incoming .col__title { color: #1565C0; }
  .col--done .col__title { color: #6D7CFF; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px 12px; margin: 8px 4px; font-size: 13.7px; line-height: 1.45; }
  .card + .card { margin-top: 10px; }
  .card__pri { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 999px; margin-right: 8px; vertical-align: 2px; }
  .card__pri--P0 { background: #FFEBEB; color: #C0392B; }
  .card__pri--P1 { background: #FFF7E0; color: #B97400; }
  .card__pri--P2 { background: #E8F0FE; color: #1967D2; }
  .card__pri--P3 { background: #EEF0F4; color: #5E6A7D; }
  .card__pri--done { background: #E6F4EA; color: #1E7A38; }
  .card__body { color: var(--d-text); }
  .card__body code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-size: 0.92em; }
  .card__meta { color: var(--text-3); font-size: 12.5px; margin-top: 6px; }
  .card__body a { color: var(--primary-d, #6D7CFF); }
  .empty { color: var(--text-3); font-style: italic; padding: 8px 10px; }
  .loading { color: var(--text-3); padding: 16px; }
  .error { color: #C0392B; padding: 10px 14px; background: #FFEBEB; border-radius: 8px; margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-lock" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 0 1 8 0v3" fill="none" stroke="currentColor" stroke-width="1.6"/></symbol>
  </defs>
</svg>

<header class="topbar">
  <div class="container topbar-inner">
    <a href="/" class="wordmark">
      <span class="wordmark__logo"><svg width="16" height="16"><use href="#ic-lock"/></svg></span>
      <span class="wordmark__name">SafeBot<span style="color:var(--text-3);font-weight:500">.Chat</span></span>
    </a>
    <nav class="nav-links">
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/docs">Docs</a>
      <a class="nav-link" href="/connect">Connect</a>
      <a class="nav-link" href="/source">Source</a>
    </nav>
  </div>
</header>

<main class="doc-body">
  <div class="board-head">
    <h1>Roadmap board</h1>
    <div class="board-meta">
      Source: <a href="https://github.com/alexkirienko/safebot-chat/blob/master/docs/BOARD.md" rel="noopener">docs/BOARD.md</a>
      · rendered live from git · edit via PR to move items between columns
    </div>
  </div>

  <div id="columns" class="columns">
    <div class="loading">Loading board…</div>
  </div>
  <div id="err"></div>
</main>

<script src="/js/board-parser.js"></script>
<script>
  (async () => {
    try {
      const r = await fetch('/docs/BOARD.md', { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const md = await r.text();
      render(BoardParser.parse(md), md);
    } catch (e) {
      document.getElementById('columns').innerHTML = '';
      const err = document.createElement('div');
      err.className = 'error';
      err.textContent = 'Failed to load /docs/BOARD.md: ' + e.message;
      document.getElementById('err').appendChild(err);
    }
  })();

  // parse() and mdInlineToHtml() are loaded from /js/board-parser.js so
  // tests/board_parser.js can exercise them outside the browser.
  function render(board, rawMd) {
    const cols = [
      { key: 'doing',    title: 'Doing',    items: board.doing,    cls: 'col--doing',
        empty: 'Nothing active. Start the next item from Incoming.' },
      { key: 'incoming', title: 'Incoming', items: board.incoming, cls: 'col--incoming',
        empty: 'Empty — roadmap is fully shipped.' },
      { key: 'done',     title: 'Done',     items: board.done.slice().reverse(), cls: 'col--done',
        empty: 'Nothing shipped yet.' },
    ];
    const root = document.getElementById('columns');
    root.innerHTML = '';
    // Parser fail-safe: fires on full breakage (zero total cards on non-empty
    // input) OR partial breakage (any of the three expected column headers
    // missing from the source — e.g. `## DOING` silently renamed to `## TODO`
    // would leave DOING empty but INCOMING/DONE intact, total still > 0).
    const total = board.doing.length + board.incoming.length + board.done.length;
    const expected = ['DOING', 'INCOMING', 'DONE'];
    const missing = expected.filter((name) => !board.sawSections || !board.sawSections.has(name));
    const fullBreakage = total === 0 && rawMd && rawMd.trim().length > 0;
    if (fullBreakage || missing.length > 0) {
      const warn = document.createElement('div');
      warn.className = 'error';
      warn.textContent = fullBreakage
        ? 'Board parser found zero cards. The markdown shape may have changed — showing raw contents below.'
        : `Board parser did not see these expected section headers: ${missing.join(', ')}. One or more columns may be empty by accident — showing raw contents below.`;
      document.getElementById('err').appendChild(warn);
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;background:var(--surface-2);padding:14px;border-radius:8px;font-size:13px;overflow-x:auto';
      pre.textContent = rawMd;
      document.getElementById('err').appendChild(pre);
    }
    for (const c of cols) {
      const col = document.createElement('section');
      col.className = 'col ' + c.cls;
      const head = document.createElement('div');
      head.className = 'col__head';
      head.innerHTML = `<span class="col__title">${c.title}</span><span class="col__count">${c.items.length}</span>`;
      col.appendChild(head);
      if (c.items.length === 0) {
        const em = document.createElement('div');
        em.className = 'empty';
        em.textContent = c.empty;
        col.appendChild(em);
      } else {
        for (const it of c.items) {
          const card = document.createElement('div');
          card.className = 'card';
          const priClass = it.pri ? `card__pri--${it.pri}` : (c.key === 'done' ? 'card__pri--done' : '');
          const priLabel = it.pri || (c.key === 'done' ? '✓' : '');
          const pri = priLabel ? `<span class="card__pri ${priClass}">${priLabel}</span>` : '';
          card.innerHTML = `<div class="card__body">${pri}${BoardParser.mdInlineToHtml(it.body)}</div>`;
          col.appendChild(card);
        }
      }
      root.appendChild(col);
    }
  }
</script>

</body>
</html>
